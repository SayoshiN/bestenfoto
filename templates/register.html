{% extends "base.html" %}
{% block title %}Регистрация — BestenFoto{% endblock %}
{% block extra_css %}
<style>
.auth-wrap {
  max-width:420px;
  margin:3rem auto;
  padding:0 1rem;
}
.auth-logo {
  text-align:center;
  margin-bottom:2rem;
}
.auth-logo h2 {
  font-family:'Playfair Display',serif;
  font-size:2.2rem;
  background:var(--gradient-3);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.auth-logo p {
  color:var(--text-muted);
  font-size:14px;
  margin-top:8px;
}
.auth-footer {
  text-align:center;
  margin-top:1.5rem;
  font-size:13px;
  color:var(--text-muted);
}
.auth-footer a {
  color:var(--accent);
  text-decoration:none;
  font-weight:700;
}
.auth-footer a:hover {
  text-decoration:underline;
}
.divider {
  height:1px;
  background:var(--border);
  margin:1.5rem 0;
  position:relative;
}
.divider span {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:var(--bg-card);
  padding:0 14px;
  font-size:11px;
  color:var(--text-muted);
  font-weight:600;
}
.social-btn {
  width:100%;
  padding:14px;
  border-radius:16px;
  border:1.5px solid var(--border);
  background:var(--gradient-1);
  color:#fff;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:all 0.2s;
  margin-bottom:0.8rem;
  box-shadow:0 4px 20px rgba(255,45,120,0.3);
  -webkit-user-select:none;
  user-select:none;
  touch-action:manipulation;
}
.social-btn:active {
  transform:scale(0.96);
}
.social-btn:hover {
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(255,45,120,0.4);
}
@media (max-width:480px) {
  .auth-wrap { margin:2rem auto }
  .auth-logo h2 { font-size:1.8rem }
}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-logo">
    <h2>&#128247; Instagram</h2>
    <p>Авторизуйтесь для голосования</p>
  </div>
  <div class="card">
    <h3 style="font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:1.5rem;color:var(--text)">Авторизация через Instagram</h3>

    <button class="social-btn" onclick="alert('Введите данные для входа!')">
      <span style="font-size:18px">&#128247;</span> Как войти через Инстаграм?
    </button>

    <div class="divider"><span>или</span></div>

    <form method="POST">
      <div class="form-group">
        <label>Никнейм</label>
        <input type="text" name="username" placeholder="Введите свой юзернейм Instagram" required autofocus>
      </div>
      <div class="form-group">
        <label>Почта</label>
        <input type="email" name="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" placeholder="Введите пароль" required>
      </div>
      <button type="submit" class="btn btn-rose" style="width:100%;margin-top:0.5rem">Войти через Instagram &#9829;</button>
    </form>
  </div>
  <p class="auth-footer">Уже есть аккаунт? <a href="/login">Войти</a></p>
</div>
{% endblock %}
