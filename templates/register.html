{% extends "base.html" %}
{% block title %} Авторизация — BestenFoto{% endblock %}
{% block extra_css %}
<style>
.auth-wrap {
  max-width:440px;
  margin:3rem auto;
}
.auth-logo {
  text-align:center;
  margin-bottom:2.5rem;
}
.auth-logo h2 {
  font-family:'Playfair Display',serif;
  font-size:2.4rem;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.auth-logo p {
  color:var(--text-muted);
  font-size:15px;
  margin-top:8px;
}
.auth-footer {
  text-align:center;
  margin-top:1.5rem;
  font-size:14px;
  color:var(--text-muted);
}
.auth-footer a {
  color:var(--accent);
  text-decoration:none;
  font-weight:600;
}
.auth-footer a:hover {
  text-decoration:underline;
}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-logo">
    <h2>&#9829; Вход через Instagram</h2>
    <p>Авторезируйтесь в аккаунт Instagram для голосования</p>
  </div>
  <div class="card">
    <h3 style="font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:1.8rem;color:var(--text)">Регистрация</h3>
    <form method="POST">
      <div class="form-group">
        <label>Никнейм</label>
        <input type="text" name="username" placeholder="Введите свой ник в Инстаграмме" required autofocus>
      </div>
      <div class="form-group">
        <label>Почта</label>
        <input type="email" name="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" placeholder="Введите пароль от аккаунта" required>
      </div>
      <button type="submit" class="btn btn-rose" style="width:100%;margin-top:0.5rem">Войти через Instagram &#9829;</button>
    </form>
  </div>
  <p class="auth-footer">Уже есть аккаунт? <a href="/login">Войти</a></p>
</div>
{% endblock %}
